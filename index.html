<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S0LITA1RE | 极简导航</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-color: #2c3e50;
            --accent-color: #3498db;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .nav-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px 15px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: #fff;
        }

        .card .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card span {
            font-size: 0.9rem;
            font-weight: 500;
        }

        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>S0LITA1RE WORKSPACE</h1>
        </header>

        <div class="nav-links">
            <a href="./dlgj/" class="card">
                <div class="icon">🚌</div>
                <span>大连公交查询神器</span>
            </a>
            
            <a href="./jzgj/" class="card">
                <div class="icon">🚌</div>
                <span>锦州公交查询神器</span>
            </a>
            
            <a href="./tc/" class="card">
                <div class="icon">🎨</div>
                <span>迅雷评论区检索神器</span>
            </a>

            <a href="https://github.com/s0lita1re" target="_blank" class="card">
                <div class="icon">🐙</div>
                <span>GitHub</span>
            </a>
        </div>

        <footer>
            &copy; 2024 S0LITA1RE. Minimalist Design.
        </footer>
    </div>

</body>
</html>
